name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install langchain-text-splitters python-multipart

      - name: Lint with ruff
        run: ruff check . --select=E,F,W --ignore=E501
        continue-on-error: true

      - name: Run tests
        env:
          # Tests usan mocks — no necesitan API keys reales
          GROQ_API_KEY: "mock-key-for-tests"
          ANTHROPIC_API_KEY: "mock-key-for-tests"
          LANGCHAIN_TRACING_V2: "false"
          ENVIRONMENT: "development"
        run: |
          pytest tests/ -v --tb=short --cov=. --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f infra/Dockerfile -t ai-incident-response:${{ github.sha }} .

      - name: Smoke test Docker image
        run: |
          docker run --rm \
            -e GROQ_API_KEY=mock \
            -e LANGCHAIN_TRACING_V2=false \
            ai-incident-response:${{ github.sha }} \
            python -c "from graph.workflow import compile_graph; g = compile_graph(); print('Graph OK')"
